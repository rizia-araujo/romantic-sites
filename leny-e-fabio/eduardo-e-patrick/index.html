<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eduardo e Patrick ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#ui{
    position:relative;
    width:100vw;
    height:100vh;
}

.love_horizontal{
    position:absolute;
    top:50%;
    left:50%;
    animation: horizontal 10s infinite alternate ease-in-out;
}

.love_vertical{
    position:absolute;
    animation: vertical 8s infinite alternate ease-in-out;
}

.love_word{
    color:#ff8fc7;
    font-size:14px;
    white-space:nowrap;
    font-family:Arial,sans-serif;
    text-shadow:0 0 8px white;
    transform:translate(-50%,-50%);
}

@keyframes horizontal{
    from{
        transform:translateX(-220px);
    }
    to{
        transform:translateX(220px);
    }
}

@keyframes vertical{
    from{
        transform:translateY(-260px);
    }
    to{
        transform:translateY(260px);
    }
}

</style>
</head>
<body>

<div id="ui"></div>

<script>

const ui = document.getElementById("ui");

const totalWords = 120;
const scale = 18;
const words = [];

for(let i = 0; i < totalWords; i++){

    const el = document.createElement("div");

    el.className = "love_word";
    el.textContent = "love you";

    el.style.position = "absolute";

    ui.appendChild(el);

    words.push(el);
}

function heart(t){

    return {
        x: 16 * Math.pow(Math.sin(t),3),

        y:
            13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t)
    };
}

function animate(){

    const time = performance.now() * 0.0005;

    for(let i=0;i<totalWords;i++){

        const t =
            ((i / totalWords) * Math.PI * 2 + time)
            % (Math.PI * 2);

        const p = heart(t);

        words[i].style.left =
            `${window.innerWidth/2 + p.x * scale}px`;

        words[i].style.top =
            `${window.innerHeight/2 - p.y * scale}px`;
    }

    requestAnimationFrame(animate);
}

animate();


</script>
